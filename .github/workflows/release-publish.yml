name: Release Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows: ["CI Release Gates"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version (for example 1.2.3 or 1.2.3-rc.1)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version '$VERSION'. Expected SemVer-like value." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Restore
        run: dotnet restore Charisma.sln

      - name: Pack projects
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/packages

          projects=(
            src/Charisma.Schema/Charisma.Schema.csproj
            src/Charisma.Parser/Charisma.Parser.csproj
            src/Charisma.Generator/Charisma.Generator.csproj
            src/Charisma.QueryEngine/Charisma.QueryEngine.csproj
            src/Charisma.Runtime/Charisma.Runtime.csproj
            src/Charisma.Migration/Charisma.Migration.csproj
            src/Charisma.All/Charisma.All.csproj
            src/Charisma.Client/Charisma.Client.csproj
          )

          for p in "${projects[@]}"; do
            echo "Packing $p"
            dotnet pack "$p" -c Release --no-restore -o artifacts/packages \
              -p:Version=${{ steps.version.outputs.version }} \
              -p:PackageVersion=${{ steps.version.outputs.version }}
          done

      - name: Configure GitHub Packages source
        env:
          GH_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$GH_TOKEN_FALLBACK"

          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "$TOKEN" \
            --store-password-in-clear-text

      - name: Publish to GitHub Packages
        shell: bash
        env:
          GH_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$GH_TOKEN_FALLBACK"

          for pkg in artifacts/packages/*.nupkg; do
            echo "Pushing $(basename "$pkg") to GitHub Packages"
            dotnet nuget push "$pkg" --source github --api-key "$TOKEN" --skip-duplicate
          done

      - name: NuGet.org login (Trusted Publishing)
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_ORG_USER || github.repository_owner }}

      - name: Publish to NuGet.org (stable only)
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "Pre-release version detected ($VERSION); skipping NuGet.org publish."
            exit 0
          fi

          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: NuGet consumer smoke test (private feed)
        shell: bash
        env:
          GH_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="$GH_TOKEN_FALLBACK"

          rm -rf ./artifacts/consumer
          mkdir -p ./artifacts/consumer
          pushd ./artifacts/consumer

          dotnet new console -n Consumer --framework net8.0
          pushd Consumer

          dotnet nuget remove source github 2>/dev/null || true
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "$TOKEN" \
            --store-password-in-clear-text

          dotnet add package CharismaORM --version "${{ steps.version.outputs.version }}" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          printf '%s\n' \
            'using System;' \
            'using Charisma.Runtime;' \
            '' \
            'Console.WriteLine(typeof(CharismaRuntimeOptions).FullName);' > Program.cs

          dotnet build -c Release
          popd
          popd

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs-${{ steps.version.outputs.version }}
          path: artifacts/packages/*.nupkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/packages/*.nupkg
