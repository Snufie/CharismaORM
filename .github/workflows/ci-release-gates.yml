name: CI Release Gates

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-unit:
    name: Build and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore Charisma.sln

      - name: Build release-gated projects (exclude TestApp)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t projects < <(find src tests -name "*.csproj" ! -path "*/tests/TestApp/*")
          for p in "${projects[@]}"; do
            echo "Building $p"
            dotnet build "$p" -c Release --no-restore
          done

      - name: Run unit/component test suites
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tests < <(find tests -name "*Tests.csproj")
          for t in "${tests[@]}"; do
            echo "Testing $t"
            dotnet test "$t" -c Release --no-build --verbosity normal
          done

  postgres-integration:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-unit
    env:
      CHARISMA_RUN_PG_INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Run migration integration tests
        run: dotnet test tests/Charisma.Migration.Tests/Charisma.Migration.Tests.csproj -c Release --verbosity normal

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Run NuGet vulnerability audit
        run: dotnet list Charisma.sln package --vulnerable --include-transitive

  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    needs:
      - build-and-unit
      - postgres-integration
      - dependency-audit

    steps:
      - name: All release gates passed
        run: echo "All release gates are green."
